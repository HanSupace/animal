<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>쫄? - 미니게임 대결</title>
    <style>
        :root {
            --point-color: #ffeb3b; 
            --text-color: #ffffff;
            --btn-green: #4caf50;
            --btn-orange: #ff9800;
            --bg-blue: #1a6ee8;
        }

        /* ── 전역 드래그 선택 방지 ── */
        * {
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Do Hyeon', sans-serif;
            background: radial-gradient(circle at center, var(--bg-blue) 0%, #06073a 100%);
            color: var(--text-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100dvh; overflow-y: auto; padding: 20px 0;
            overflow-x: hidden; /* 🔥 이거로 바꿔 */
            width: 100%;
            height: 100vh;
        }

        .container {
        width: 100%;
        max-width: 420px;
        padding: 0 12px;
        box-sizing: border-box;
        }

        /* 배경 장식 텍스트 */
        .bg-deco {
            position: fixed;
            font-family: 'Do Hyeon', sans-serif;
            color: rgba(255,255,255,0.13);
            pointer-events: none;
            z-index: 0;
            line-height: 1.2;
            user-select: none;
        }

        /* 로고 전체 블록 */
        .logo-wrapper {
            position: relative;
            width: 100%;
            margin: 0 0 50px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 노란 줄  */
        .logo-stripe {
            position: absolute;
            left: -60vw;
            width: 200vw;
            height: 28px;
            background: #ffeb3b;
            pointer-events: none;
            box-shadow: 0 6px 0 #cc7a00, 0 10px 0 #a85500, 0 18px 16px rgba(0,0,0,0.35);
            z-index: 0;
        }
        .logo-stripe-top    { top: -30px; }
        .logo-stripe-bottom { bottom: -6px; }

        /* ㅋㅋㅋ + 쫄? + ㅋㅋㅋ  */
        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0px;
            padding: 36px 0;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        /* 양옆 ㅋㅋㅋ */
        .logo-kk {
            font-family: 'Do Hyeon', sans-serif;
            font-size: clamp(40px, 12vw, 100px);
            color: #ffdd33;
            text-shadow: 0px 5px 0 #cc7a00, 0px 9px 0 #a85500, 0px 18px 16px rgba(0,0,0,0.35);
            line-height: 1;
            white-space: nowrap;
            display: inline-block;
        }
        .logo-kk-left  { animation: floatKKLeft  2.7s ease-in-out infinite; }
        .logo-kk-right { animation: floatKKRight 3.4s ease-in-out 0.5s infinite; }

        .app-logo {
            font-size: clamp(50px, 15vw, 130px); margin: 0 8px; color: #ffdd33; display: inline-block;
            text-shadow: 0px 6px 0 #cc7a00, 0px 12px 0 #b35f00, 0px 24px 20px rgba(0,0,0,0.4);
            line-height: 1;
            position: relative; z-index: 1;
            animation: floatLogo 3s ease-in-out 0.2s infinite;
        }
        #reactionArea {
            display: none; width: 100%; max-width: 350px; height: 350px; margin: 0 auto; border-radius: 20px;
            justify-content: center; align-items: center; font-size: 32px; font-weight: bold; cursor: pointer; user-select: none; transition: background-color 0.1s;
        }
        @keyframes float      { 0%, 100% { transform: translateY(0px);              } 50% { transform: translateY(-15px);              } }
        @keyframes floatLogo  { 0%, 100% { transform: rotate(15deg) translateY(0px); } 50% { transform: rotate(15deg) translateY(-18px); } }
        @keyframes floatKKLeft  {
            0%   { transform: rotate(-5deg)  translateY(0px); }
            30%  { transform: rotate(-7deg)  translateY(-12px); }
            60%  { transform: rotate(-4deg)  translateY(-6px); }
            100% { transform: rotate(-5deg)  translateY(0px); }
        }
        @keyframes floatKKRight {
            0%   { transform: rotate(6deg)   translateY(0px); }
            40%  { transform: rotate(4deg)   translateY(-14px); }
            70%  { transform: rotate(7deg)   translateY(-5px); }
            100% { transform: rotate(6deg)   translateY(0px); }
        }

        #screen-landing { padding-top: 10px; }
        
        input[type="text"] {
            width: 100%; padding: 15px; font-size: 18px; border-radius: 50px; border: none;
            background: rgba(255,255,255,0.92); color: #333; box-sizing: border-box; margin-bottom: 15px; text-align: center; font-family: inherit;
            box-shadow: 0 4px 14px rgba(0,0,0,0.15);
        }
        input[type="text"]::placeholder { color: #aaa; }

        button {
            width: 100%; padding: 15px; font-size: 24px; border: none; border-radius: 50px; cursor: pointer;
            transition: all 0.2s; margin-bottom: 10px; box-shadow: 0 6px 0px rgba(0,0,0,0.3); font-family: inherit;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0px rgba(0,0,0,0.3); }
        .btn-main { background-color: var(--point-color); color: #1a1a1a; }
        .btn-sub { background-color: rgba(255,255,255,0.15); color: white; border: 2px solid rgba(255,255,255,0.5); backdrop-filter: blur(4px); }
        .btn-back { margin-top: 15px; border-color: rgba(255, 255, 255, 0.3); color: #ccc; font-size: 20px; }
        
        .rect-wait { background-color: #f44336; color: white; } /* 대기 상태 (빨간색) */
        .rect-go   { background-color: #4caf50; color: white; box-shadow: 0 0 20px rgba(76, 175, 80, 0.6); } /* 클릭 타이밍 (초록색 + 빛나는 효과) */
        .rect-foul { background-color: #757575; color: #ccc; }  /* 실패 및 종료 (회색) */

        .screen { display: none; }
        .active  { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #gameNameDisplay { font-size: 36px; color: var(--point-color); margin: 0; display: none; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); text-align: center; }        #usersList { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; text-align: left; margin-bottom: 15px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.15);}
        #userUl { list-style: none; padding: 0; margin: 0; }
        #userUl li { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 20px; }
        .ready-status { color: #81c784; }
        .not-ready    { color: #e57373; }

        #timer { font-size: 80px; color: var(--point-color); display: none; margin: 0; animation: pulse 1s infinite; text-shadow: 0 0 20px rgba(255,235,59,0.6); text-align: center; }        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        #clickBtn { font-size: 50px; padding: 40px; background: radial-gradient(circle, #ff5e5e 0%, #c62828 100%); display: none; border-radius: 30px; color: white; box-shadow: 0 10px 0px #8e0000; width: 100%; margin: 0; }
        #clickBtn:disabled { background: #555; box-shadow: 0 10px 0px #333; color: #aaa; cursor: not-allowed; }

        #avoidCanvas { display: none; background: #111; border: 2px solid var(--point-color); margin: 10px auto; border-radius: 15px; touch-action: none; width: 350px; height: 350px; max-width: 100%; }

        .chat-box { height: 100px; background: rgba(0,0,0,0.2); border-radius: 15px; overflow-y: auto; padding: 10px; text-align: left; margin-top: 15px; font-size: 16px; border: 1px solid rgba(255,255,255,0.15);}
        .chat-input-set { display: flex; gap: 5px; margin-top: 5px; }
        #chatInput { margin-bottom: 0; padding: 10px 15px; border-radius: 15px; flex-grow: 1; font-size: 18px; background: rgba(255,255,255,0.92) !important; color: #333 !important;}

        #resultPopup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 80, 200, 0.95); z-index: 999; flex-direction: column; justify-content: center; align-items: center; animation: fadeIn 0.3s; }
        .popup-title { font-size: 70px; margin: 0 0 20px 0; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; }
        .win-text  { color: #ffeb3b; }
        .lose-text { color: #e57373; }
        .draw-text { color: #4fc3f7; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        #readyBtn, #leaveBtn { transition: none; }
        #readyBtn[style*="display: none"], #leaveBtn[style*="display: none"] { margin: 0 !important; padding: 0 !important; height: 0 !important; border: none !important; }
        #myBet-wrapper[style*="display: none"] { margin: 0 !important; }

        #deadOverlay {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 350px; height: 350px;
            background: rgba(0,0,0,0.85);
            border-radius: 15px;
            flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; text-align: center; padding: 20px;
            box-sizing: border-box; backdrop-filter: blur(4px);
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid var(--point-color);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #deadMsg { font-size: 26px; color: var(--point-color); line-height: 1.4; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin: 10px 0; }

        /* ════════════════════════════════
           MEMORY GAME STYLES
        ════════════════════════════════ */
        #memoryWrapper { display: none; width: 100%; margin: 10px 0; }

        /* 게임 전체 제한 시간 */
        #memoryGameTimer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 18px;
            color: #fff;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 6px 14px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        #memoryGameTimerVal { font-size: 26px; color: var(--point-color); font-weight: bold; min-width: 40px; text-align: center; }
        #memoryGameTimer.urgent #memoryGameTimerVal { color: #ff5252; animation: pulse 0.6s infinite; }

        /* 내 턴 10초 카운트다운 */
        #memoryTurnTimer {
            display: none; align-items: center; justify-content: center; gap: 8px;
            font-size: 18px; color: #fff;
            background: rgba(255,235,59,0.15); border: 1px solid rgba(255,235,59,0.35);
            border-radius: 10px; padding: 6px 14px; margin-bottom: 8px;
        }
        #memoryTurnTimerVal { font-size: 26px; color: var(--point-color); font-weight: bold; min-width: 24px; text-align: center; }
        #memoryTurnTimer.urgent { background: rgba(255,82,82,0.2); border-color: rgba(255,82,82,0.5); }
        #memoryTurnTimer.urgent #memoryTurnTimerVal { color: #ff5252; animation: pulse 0.4s infinite; }

        /* 턴 표시 배너 - moved above */

        /* 5초 공개 카운트다운 */
        #memoryRevealTimer {
            font-size: 18px; color: #fff;
            background: rgba(255,235,59,0.18); border-radius: 10px;
            padding: 6px 12px; margin-bottom: 8px; display: none;
        }

        /* 4×4 카드 그리드 */
        #memoryGrid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; width: 100%; max-width: 360px; margin: 0 auto;
        }

        .mg-card { aspect-ratio: 1; perspective: 600px; cursor: pointer; }
        .mg-card.matched, .mg-card.no-click { cursor: default; pointer-events: none; }
        .mg-card__inner {
            position: relative; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.55s cubic-bezier(.4,0,.2,1);
            border-radius: 10px;
        }
        .mg-card.face-up .mg-card__inner  { transform: rotateY(180deg); }
        .mg-card.matched  .mg-card__inner  { transform: rotateY(180deg); }

        .mg-card__back, .mg-card__front {
            position: absolute; inset: 0; border-radius: 10px;
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(1.2rem, 6vw, 2rem);
        }
        .mg-card__back {
            background: rgba(0,0,0,0.55); border: 2px solid rgba(255,235,59,0.3);
            font-size: clamp(1rem, 5vw, 1.5rem); color: rgba(255,255,255,0.25);
        }
        .mg-card__back::after { content: '❓'; }
        .mg-card__front {
            background: linear-gradient(135deg, #fff 0%, #f0e8ff 100%);
            border: 2px solid rgba(200,160,255,0.4); transform: rotateY(180deg);
        }
        .mg-card.matched .mg-card__front {
            background: linear-gradient(135deg, #e8fff0, #b2ffd0);
            border-color: #00e676; box-shadow: 0 0 14px rgba(0,230,118,.5);
            animation: mgMatchPop .4s ease;
        }
        @keyframes mgMatchPop {
            0%   { transform: rotateY(180deg) scale(1); }
            50%  { transform: rotateY(180deg) scale(1.13); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        /* 내 턴 하이라이트 */
        #memoryGrid.my-turn .mg-card:not(.matched):not(.face-up) { border-color: var(--point-color); box-shadow: 0 0 8px rgba(255,235,59,.35); }
        #memoryGrid.my-turn .mg-card:not(.matched):not(.face-up):hover .mg-card__back { background: rgba(255,235,59,.12); }

        /* 점수판 */
        #memoryScoreBoard {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 8px 12px;
            margin-top: 10px;
            font-size: 17px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        #memoryTurnBanner {
            font-size: 20px;
            color: var(--point-color);
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 8px 14px;
            margin-bottom: 10px;
            min-height: 38px;
            letter-spacing: -0.3px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .mg-score-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .mg-score-name { font-size: 13px; color: rgba(255,255,255,0.6); }
        .mg-score-val  { font-size: 26px; color: var(--point-color); font-weight: bold; }
        .mg-score-item.active-player .mg-score-name { color: var(--point-color); }

        /* ───────── 모바일 최적화 ───────── */
    @media (max-width: 480px) {

        body {
            padding: 10px 0;
        }

        .logo-kk {
            font-size: 60px;
        }

        .app-logo {
            font-size: 80px;
        }

        .logo-row {
            padding: 20px 0;
        }

        input[type="text"] {
            font-size: 16px;
            padding: 12px;
        }

        button {
            font-size: 18px;
            padding: 12px;
        }

        #gameNameDisplay {
            font-size: 24px;
        }

        #timer {
            font-size: 50px;
        }

        #clickBtn {
            font-size: 30px;
            padding: 25px;
        }

        #reactionArea {
            height: 260px;
            font-size: 24px;
        }

        #avoidCanvas {
            width: 100%;
            height: auto;
            aspect-ratio: 1;
        }

        /* 메모리 카드 */
        #memoryGrid {
            gap: 6px;
        }

        .mg-card__front,
        .mg-card__back {
            font-size: 1.2rem;
        }

        /* 채팅 */
        .chat-box {
            height: 80px;
            font-size: 14px;
        }

        #chatInput {
            font-size: 14px;
        }

        /* 결과 팝업 */
        .popup-title {
            font-size: 40px;
        }

        .logo-stripe {
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
        }
    }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap" rel="stylesheet">
</head>

<div class="bg-deco" style="font-size:30px; top:6%; right:4%; transform:rotate(5deg);">ㅉ!</div>

<div class="bg-deco" style="font-size:40px; top:30%; right:2%; transform:rotate(10deg);">ㅉ!</div>

<div class="bg-deco" style="font-size:52px; top:8%; left:50%; transform:rotate(6deg);">ㄹㅇㅋㅋ</div>
<div class="bg-deco" style="font-size:44px; top:60%; right:2%; transform:rotate(-9deg);">ㅉ!</div>
<div class="bg-deco" style="font-size:48px; top:70%; left:2%; transform:rotate(8deg);">EZ~</div>

<div class="bg-deco" style="font-size:40px; top:83%; left:33%; transform:rotate(11deg);">개쫄?</div>
<div class="bg-deco" style="font-size:30px; top:90%; left:5%; transform:rotate(-6deg);">gg</div>
<div class="bg-deco" style="font-size:32px; top:87%; right:5%; transform:rotate(7deg);">쫄지마</div>

<div class="container">
    <div class="logo-wrapper">
        <div class="logo-stripe logo-stripe-top"></div>
        <div class="logo-row">
            <span class="logo-kk logo-kk-left">ㅋㅋㅋ</span>
            <h1 class="app-logo">쫄?</h1>
            <span class="logo-kk logo-kk-right">ㅋㅋㅋ</span>
        </div>
        <div class="logo-stripe logo-stripe-bottom"></div>
    </div>

    <div id="screen-landing" class="screen active">
        <input type="text" id="userName" placeholder="닉네임을 입력하세요" maxlength="8" autocomplete="off"/>
        <button class="btn-main" onclick="goToMenu()">시작하기</button>
    </div>

    <div id="screen-role" class="screen">
        <p id="welcome-msg"></p>
        <button class="btn-main" onclick="createRoom()">방 만들기</button>
        <button class="btn-sub" onclick="showJoinInput()">입장하기</button>
        <div id="join-input-area" style="display:none; margin-top:15px;">
            <input type="text" id="roomNameInput" placeholder="방 코드" maxlength="10" autocomplete="off" style="text-transform:uppercase"/>
            <button class="btn-main" onclick="joinRoom()">입장 완료</button>
        </div>
        <button class="btn-sub btn-back" onclick="goBackToLanding()">← 뒤로가기</button>
    </div>

    <div id="screen-game" class="screen">
        <h2 id="roomTitle" style="color: rgba(255,255,255,0.7); margin-top:0;"></h2>
        <h1 id="bigBetDisplay" style="color:#ffeb3b; font-size:40px; margin:10px 0;"></h1>
        <div id="usersList">
            <h4 style="margin: 0 0 10px 0; color: var(--point-color); font-size: 22px;">참가자 목록</h4>
            <ul id="userUl"></ul>
        </div>

        <div style="margin-bottom:15px;">
            <select id="myBet" onchange="selectBet()" style="width:100%; padding:10px; border-radius:10px; font-size:16px;">
                <option value="">내기 선택</option>
                <option value="밥">🍚 밥 내기</option>
                <option value="카페">☕ 카페 내기</option>
                <option value="피방">🎮 피방 내기</option>
                <option value="술">🍺 술 값 내기</option>
                <option value="편의점">🏪 편의점 내기</option>
            </select>
        </div>

        <div id="gameControlBtns">
            <button id="readyBtn" onclick="toggleReady()">준비하기 (Ready)</button>
        </div>

        <h2 id="gameNameDisplay"></h2>
        <div id="timer"><span id="timeDisplay">3</span></div>
        <button id="clickBtn" onclick="sendClick()">클릭</button>

        <div id="avoidWrapper" style="position: relative; width: 350px; height: 350px; margin: 0 auto; display: none;">
            <canvas id="avoidCanvas" width="350" height="350"></canvas>
            <div id="deadOverlay">
                <div class="spinner"></div>
                <p id="deadMsg"></p>
                <p style="font-size:12px; color:#aaa; margin-top:15px;">다른 플레이어의 결과를 기다리는 중...</p>
            </div>
        </div>

        <div id="reactionWrapper" style="position: relative; width: 100%; max-width: 350px; margin: 0 auto; display: none;">
            <div id="reactionArea" onclick="handleReactionClick()">화면이 초록색이 되면 클릭!</div>
            <div id="reactionDeadOverlay" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); border-radius:20px; flex-direction:column; justify-content:center; align-items:center; z-index:100; text-align:center;">
                <div class="spinner"></div>
                <p id="reactionDeadMsg" style="font-size:22px; color:var(--point-color); line-height:1.4; margin:10px 0;"></p>
                <p style="font-size:12px; color:#aaa; margin-top:10px;">다른 플레이어의 결과를 기다리는 중...</p>
            </div>
        </div>

        <!-- ══ MEMORY GAME UI ══ -->
        <div id="memoryWrapper">
            <div id="memoryGameTimer">⏱ 남은 시간 <span id="memoryGameTimerVal">--</span>초</div>
            <div id="memoryTurnTimer">🕐 내 턴 <span id="memoryTurnTimerVal">10</span>초</div>
            <div id="memoryTurnBanner">잠시 후 게임이 시작됩니다...</div>
            <div id="memoryRevealTimer">👀 카드를 외우세요! <span id="memoryRevealCount">5</span>초</div>
            <div id="memoryGrid"></div>
            <div id="memoryScoreBoard"></div>
        </div>
        <!-- ══════════════════ -->

        <div class="chat-box" id="chatBox"></div>
        <div class="chat-input-set">
            <input type="text" id="chatInput" placeholder="메시지를 입력하세요" onkeypress="if(event.key==='Enter')sendMessage()" autocomplete="off"/>
            <button onclick="sendMessage()" style="width:auto; margin:0; padding:10px 20px; border-radius:15px; background:#555;">👉</button>
        </div>
        <button id="leaveBtn" class="btn-sub btn-back" onclick="leaveRoom()">← 방 나가기</button>
    </div>
</div>

<!-- 결과 팝업 -->
<div id="resultPopup">
    <h1 id="popupTitle" class="popup-title"></h1>
    <p id="popupDesc" class="popup-desc" style="font-size:24px; color:white; margin-bottom:40px;"></p>
    <button class="btn-main" style="width: 200px;" onclick="closePopup()">확인</button>
</div>

<!-- 방 나가기 팝업 -->
<div id="leavePopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:999; justify-content:center; align-items:center; flex-direction:column;">
    <h1 id="leaveTitle" class="popup-title"></h1>
    <p id="leaveDesc" class="popup-desc" style="font-size:24px; color:white; margin-bottom:40px;"></p>
    <div style="display:flex; gap:10px;">
        <button id="confirmLeaveBtn" class="btn-main" style="width: 150px;">나가기</button>
        <button id="cancelLeaveBtn" class="btn-sub" style="width: 150px;">취소</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ════════════════════════════════════════════
    //  기본 변수
    // ════════════════════════════════════════════
    const socket = io();

    const deadMessages = [
        "괜찮아요 게임 좀 못할 수도 있죠. 마우스 쥐는 법 부터 다시 배워 볼까요?",
        "와 잠깐만요 벌써 죽었다구요? 진짜에요?",
        "풉.",
        "방금 건 좀 아니었다 그쵸?",
        "님 실력 실화임? ㅋㅋㅋ",
        "이걸 못 피하네... ㅉㅉ"
    ];

    let myName = "", isMyReady = false, countdownInterval;
    let resultStep = 0, lastResultData = null, currentBet = null;
    let currentGameMode = null;
    let avoidGameActive = false, renderLoopActive = false, avoidEnemies = [], playerPos = { x: 175, y: 175 };
    let reactionStartTime = 0, reactionState = 'DISABLED';
    let isFouler = false;

    const screens     = document.querySelectorAll('.screen');
    const avoidCanvas = document.getElementById('avoidCanvas');
    const avoidCtx    = avoidCanvas.getContext('2d');
    const reactionArea = document.getElementById('reactionArea');

    // 드래그 선택 방지
    document.addEventListener('dragstart', e => e.preventDefault());

    // ════════════════════════════════════════════
    //  화면 전환
    // ════════════════════════════════════════════
    function changeScreen(id) {
        screens.forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goToMenu() {
        myName = document.getElementById('userName').value.trim();
        if (!myName) return alert("닉네임을 입력해 주세요.");
        document.getElementById('welcome-msg').innerText = `반갑습니다, ${myName}님!`;
        changeScreen('screen-role');
    }

    function createRoom() { performJoin(Math.random().toString(36).substring(2, 6).toUpperCase()); }

    function showJoinInput() {
        const area = document.getElementById('join-input-area');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
    }

    function joinRoom() {
        const code = document.getElementById('roomNameInput').value.trim().toUpperCase();
        if (!code) return alert("방 코드를 입력해 주세요.");
        socket.emit('check_room', code, (exists) => {
            if (exists) performJoin(code);
            else alert("존재하지 않는 방 코드입니다.");
        });
    }

    function performJoin(code) {
        document.getElementById('chatBox').innerHTML = '';
        socket.emit('join_room', { roomName: code, userName: myName });
        document.getElementById('roomTitle').innerText = `ROOM : ${code}`;
        changeScreen('screen-game');
    }

    function goBackToLanding() { changeScreen('screen-landing'); }

    // ════════════════════════════════════════════
    //  UI 초기화
    // ════════════════════════════════════════════
    function resetUI() {
        clearInterval(countdownInterval);
        isFouler = false;

        const readyBtn = document.getElementById('readyBtn');
        readyBtn.innerText = "준비하기 (Ready)";
        readyBtn.style.backgroundColor = "var(--btn-green)";
        readyBtn.style.color = "#3a0002";

        document.getElementById('gameControlBtns').style.display = 'block';
        document.getElementById('myBet').parentElement.style.display = currentBet ? 'none' : 'block';

        const nameDisp = document.getElementById('gameNameDisplay');
        nameDisp.style.display = 'none'; nameDisp.style.margin = '0';

        const clickBtn = document.getElementById('clickBtn');
        clickBtn.style.display = 'none'; clickBtn.style.margin = '0';

        const timerDiv = document.getElementById('timer');
        timerDiv.style.display = 'none'; timerDiv.style.margin = '0';

        avoidCanvas.style.display = 'none';
        document.getElementById('avoidWrapper').style.display = 'none';
        document.getElementById('deadOverlay').style.display = 'none';

        reactionArea.style.display = 'none'; reactionArea.style.margin = '0';
        document.getElementById('reactionWrapper').style.display = 'none';
        document.getElementById('reactionDeadOverlay').style.display = 'none';
        reactionArea.className = 'rect-wait';
        reactionState = 'DISABLED';

        avoidGameActive = false;
        renderLoopActive = false;
        isMyReady = false;

        // 메모리 게임 초기화
        memoryReset();
    }

    // ════════════════════════════════════════════
    //  준비 / 내기
    // ════════════════════════════════════════════
    function toggleReady() {
        socket.emit('toggle_ready');
        isMyReady = !isMyReady;
        const btn = document.getElementById('readyBtn');
        btn.innerText = isMyReady ? "준비 취소" : "준비하기 (Ready)";
        btn.style.backgroundColor = isMyReady ? "var(--btn-orange)" : "var(--btn-green)";
        btn.style.color = "#3a0002";
    }

    function selectBet() {
        const bet = document.getElementById('myBet').value;
        socket.emit('select_bet', bet);
    }

    // ════════════════════════════════════════════
    //  소켓 이벤트 — 유저 목록 / 내기
    // ════════════════════════════════════════════
    socket.on('update_users', (users) => {
        const ul = document.getElementById('userUl');
        ul.innerHTML = '';
        for (const id in users) {
            const u = users[id];
            const li = document.createElement('li');
            const status = u.ready ? '<span class="ready-status">[준비완료]</span>' : '<span class="not-ready">[대기중]</span>';
            const dead   = u.isDead ? '<span style="color:gray;">(탈락)</span>' : '';
            li.innerHTML = `${status} ${u.userName} ${dead} <span style="float:right; color:#ffeb3b;"><b>${u.winCount || 0}승</b></span>`;
            ul.appendChild(li);
        }
        if (currentGameMode === 'MEMORY') memoryUpdateScoreBoard(users);
    });

    socket.on('room_bet_update', (bet) => {
        currentBet = bet;
        const betWrapper = document.getElementById('myBet').parentElement;
        if (bet) {
            document.getElementById('bigBetDisplay').innerText = `🔥 ${bet} 내기`;
            betWrapper.style.display = 'none';
        } else {
            document.getElementById('bigBetDisplay').innerText = '';
            document.getElementById('myBet').value = '';
            betWrapper.style.display = 'block';
        }
    });

    // ════════════════════════════════════════════
    //  소켓 이벤트 — 게임 흐름
    // ════════════════════════════════════════════
    socket.on('game_selected', (mode) => {
        currentGameMode = mode;
        document.getElementById('gameControlBtns').style.display = 'none';
        document.getElementById('myBet').parentElement.style.display = 'none';

        const title = document.getElementById('gameNameDisplay');
        if      (mode === 'CLICK')    title.innerText = "🔥 광클 대결! 🔥";
        else if (mode === 'AVOID')    title.innerText = "🏃 공 피하기! 🏃";
        else if (mode === 'REACTION') title.innerText = "⚡ 반응속도 테스트! ⚡";
        else if (mode === 'MEMORY')   title.innerText = "🃏 카드 기억하기! 🃏";
        title.style.display = 'block';
        title.style.margin = '10px 0';

        if (mode === 'AVOID') {
            document.getElementById('avoidWrapper').style.display = 'block';
            avoidCanvas.style.display = 'block';
            initAvoidGameSetup();
        } else if (mode === 'REACTION') {
            document.getElementById('reactionWrapper').style.display = 'block';
            reactionArea.style.display = 'flex';
            reactionArea.style.margin = '0';
            reactionArea.className = 'rect-wait';
            reactionArea.innerText = "대기...";
            // ✅ 여기서는 DISABLED 유지 — game_start에서 WAIT으로 바꿈
            reactionState = 'DISABLED';
            isFouler = false;
        } else if (mode === 'CLICK') {
            const btn = document.getElementById('clickBtn');
            btn.style.display = 'block';
            btn.style.marginBottom = '15px';
            btn.disabled = true;
            btn.innerText = "대기...";
        } else if (mode === 'MEMORY') {
            document.getElementById('memoryWrapper').style.display = 'block';
            document.getElementById('memoryTurnBanner').innerText = '잠시 후 카드를 공개합니다...';
        }
    });

    socket.on('game_countdown', (count) => {
        const timerDiv = document.getElementById('timer');
        timerDiv.style.display = 'block';
        timerDiv.style.margin = '10px 0';
        let currentCount = count;
        document.getElementById('timeDisplay').innerText = currentCount;
        const intro = setInterval(() => {
            currentCount--;
            if (currentCount > 0) document.getElementById('timeDisplay').innerText = currentCount;
            else { document.getElementById('timeDisplay').innerText = "시작!"; clearInterval(intro); }
        }, 1000);
    });

    socket.on('game_start', ({ mode, duration }) => {
        const timeDisplay = document.getElementById('timeDisplay');
        let timeLeft = duration;
        timeDisplay.innerText = timeLeft;

        if (mode === 'CLICK') {
            const btn = document.getElementById('clickBtn');
            btn.disabled = false;
            btn.innerText = '클릭!';

        } else if (mode === 'AVOID') {
            avoidGameActive = true;

        } else if (mode === 'REACTION') {
            document.getElementById('timer').style.display = 'none';
            // ✅ game_start 시점에 WAIT으로 전환 (reaction_go 수신 준비)
            reactionState = 'WAIT';
            isFouler = false;
            reactionArea.className = 'rect-wait';
            reactionArea.innerText = "초록색이 되면 탭!";
            reactionArea.style.display = 'flex';

        } else if (mode === 'MEMORY') {
            document.getElementById('timer').style.display = 'none';
            // 게임 전체 제한 시간 카운트다운 (공개 5초 이후부터)
            let gameTimeLeft = duration;
            const gameTimerVal = document.getElementById('memoryGameTimerVal');
            const gameTimerBox = document.getElementById('memoryGameTimer');
            gameTimerVal.innerText = gameTimeLeft;
            setTimeout(() => {
                memoryGameTimerInterval = setInterval(() => {
                    gameTimeLeft--;
                    gameTimerVal.innerText = gameTimeLeft;
                    if (gameTimeLeft <= 30) gameTimerBox.classList.add('urgent');
                    if (gameTimeLeft <= 0) { clearInterval(memoryGameTimerInterval); memoryGameTimerInterval = null; }
                }, 1000);
            }, 5000); // 공개 5초 후 시작
            return;
        }

        countdownInterval = setInterval(() => {
            timeLeft--;
            if (mode !== 'REACTION') timeDisplay.innerText = timeLeft;
            if (timeLeft <= 0) { clearInterval(countdownInterval); avoidGameActive = false; }
        }, 1000);
    });

    // ════════════════════════════════════════════
    //  소켓 이벤트 — 반응속도 게임
    // ════════════════════════════════════════════

    // ✅ reaction_go: WAIT이면 GO로, DISABLED이면 WAIT 거쳐 GO로 (타이밍 방어)
    socket.on('reaction_go', () => {
        if (reactionState === 'DISABLED') reactionState = 'WAIT';
        if (reactionState === 'WAIT') {
            reactionState = 'GO';
            reactionArea.className = 'rect-go';
            reactionArea.style.display = 'flex';
            reactionArea.innerText = "지금 탭!!!";
            reactionStartTime = Date.now();
        }
    });

    socket.on('reaction_first_click', ({ winnerId }) => {
        if (reactionState === 'DISABLED') return;
        if (winnerId === socket.id) return;
        reactionState = 'DISABLED';
        reactionArea.className = 'rect-foul';
        reactionArea.innerText = "탈락 😵";
        document.getElementById('reactionDeadMsg').innerText = "탈락! 😵\n결과를 기다리는 중...";
        document.getElementById('reactionDeadOverlay').style.display = 'flex';
    });

    socket.on('reaction_eliminated', () => {
        reactionState = 'DISABLED';
        reactionArea.className = 'rect-foul';
        reactionArea.innerText = "탈락 😵";
        document.getElementById('reactionDeadMsg').innerText = "탈락! 😵\n결과를 기다리는 중...";
        document.getElementById('reactionDeadOverlay').style.display = 'flex';
    });

    function handleReactionClick() {
        if (reactionState === 'DISABLED') return;
        if (reactionState === 'WAIT') {
            reactionState = 'DISABLED';
            reactionArea.className = 'rect-foul';
            reactionArea.innerText = "부정출발! (실격)";
            isFouler = true;
            socket.emit('reaction_result', -1);
        } else if (reactionState === 'GO') {
            const diff = Date.now() - reactionStartTime;
            reactionState = 'DISABLED';
            reactionArea.innerText = `${diff}ms!`;
            socket.emit('reaction_result', diff);
        }
    }

    // ════════════════════════════════════════════
    //  소켓 이벤트 — 게임 종료
    // ════════════════════════════════════════════
    socket.on('game_over', ({ winners, winnerIds, maxScore, mode, isFinal, finalWinner, isTimeout }) => {
        let isWinner = false;
        if (winnerIds && Array.isArray(winnerIds)) {
            isWinner = winnerIds.includes(socket.id);
        } else if (winners && Array.isArray(winners)) {
            isWinner = winners.some(w => w.trim() === myName.trim());
        }
        const isDraw = winners && winners.length > 1;
        lastResultData = { winners: winners || [], maxScore, mode, isWinner, isFinal, finalWinner, isDraw, isFouler, isTimeout };
        resultStep = 0;
        showResultStep();
    });

    // ════════════════════════════════════════════
    //  결과 팝업
    // ════════════════════════════════════════════
    function showResultStep() {
        const pTitle = document.getElementById('popupTitle');
        const pDesc  = document.getElementById('popupDesc');
        const data   = lastResultData;

        if (resultStep === 0) {
            if (data.isFinal) {
                if (data.isWinner) {
                    pTitle.innerText = "🏆 최종 우승! 🏆";
                    pTitle.className = "popup-title win-text";
                    pDesc.innerText = "야르~ 야르~ 야르~";
                } else {
                    pTitle.innerText = "ㅋ 이걸 지네";
                    pTitle.className = "popup-title lose-text";
                    pDesc.innerText = `[${data.finalWinner}]님의 최종 우승입니다.`;
                }
            } else {
                // ✅ isFouler → isDraw → isWinner 순서 중요
                if (data.isFouler) {
                    pTitle.innerText = "빨리 탭하기 긁?";
                    pTitle.className = "popup-title lose-text";
                } else if (data.isDraw) {
                    pTitle.innerText = "무승부!";
                    pTitle.className = "popup-title draw-text";
                } else if (data.isWinner) {
                    pTitle.innerText = "라운드 승리!";
                    pTitle.className = "popup-title win-text";
                } else {
                    pTitle.innerText = "패배..";
                    pTitle.className = "popup-title lose-text";
                }
            }

            let desc = "";
            if (data.isDraw && !data.isFouler) {
                // ✅ 반응속도 무승부 (아무도 탭 안 함) vs 일반 무승부
                if (data.mode === 'REACTION' && (!data.winners || data.winners.length === 0 || data.maxScore === 9999)) {
                    desc = "시간 내에 아무도 탭하지 않았습니다 😅";
                } else {
                    desc = "에휴... 한번 더";
                }
            } else {
                desc = `우승자: ${data.winners.join(', ')}`;
            }

            if      (data.mode === 'CLICK')    desc += ` (${data.maxScore}회)`;
            else if (data.mode === 'REACTION' && !data.isDraw) {
                desc += (data.maxScore === 9999 || data.maxScore === 99999 || data.maxScore === "없음" || data.maxScore === "실격")
                    ? " (실패)" : ` (${data.maxScore}ms)`;
            }
            else if (data.mode === 'AVOID')    desc += ` (생존)`;
            else if (data.mode === 'MEMORY') {
                if (data.isTimeout) desc = `⏰ 시간 초과! ` + desc + ` (${data.maxScore}쌍)`;
                else desc += ` (${data.maxScore}쌍)`;
            }

            pDesc.innerText = desc;
        }
        else if (resultStep === 1 && !data.isWinner && !data.isFinal) {
            pTitle.innerText = "긁?"; pTitle.className = "popup-title lose-text"; pDesc.innerText = "긁?";
        }
        else if (resultStep === 2 && !data.isWinner && !data.isFinal) {
            pTitle.innerText = "긁?"; pTitle.className = "popup-title lose-text"; pDesc.innerText = "ㅋㅋㅋㅋ 진짜 긁?";
        }
        else if (resultStep === 3 && !data.isWinner && !data.isFinal) {
            pTitle.innerText = "다시 ㄱ?"; pTitle.className = "popup-title lose-text"; pDesc.innerText = "쫄리면 말고~";
        }
        else {
            document.getElementById('resultPopup').style.display = 'none';
            resetUI();
            if (data && !data.isFinal && !data.isDraw) toggleReady();
            return;
        }
        document.getElementById('resultPopup').style.display = 'flex';
    }

    function closePopup() { resultStep++; showResultStep(); }

    // ════════════════════════════════════════════
    //  방 나가기 팝업 ✅
    // ════════════════════════════════════════════
    function leaveRoom() {
        document.getElementById('leaveTitle').innerText = "쫄?";
        document.getElementById('leaveTitle').className = "popup-title lose-text";
        document.getElementById('leaveDesc').innerText = "이걸 나가네";
        document.getElementById('leavePopup').style.display = 'flex';
        document.getElementById('confirmLeaveBtn').onclick = () => {
            socket.emit('leave_room');
            location.reload();
        };
        document.getElementById('cancelLeaveBtn').onclick = () => {
            document.getElementById('leavePopup').style.display = 'none';
        };
    }

    // ════════════════════════════════════════════
    //  공 피하기 게임
    // ════════════════════════════════════════════
    function getCanvasPos(clientX, clientY) {
        const rect = avoidCanvas.getBoundingClientRect();
        const scaleX = avoidCanvas.width / rect.width;
        const scaleY = avoidCanvas.height / rect.height;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    function initAvoidGameSetup() {
        renderLoopActive = true; avoidGameActive = false;
        avoidEnemies = []; playerPos = { x: 175, y: 175 };
        for (let i = 0; i < 8; i++) {
            avoidEnemies.push({ x: Math.random()*350, y: Math.random()*350, dx: (Math.random()-0.5)*7, dy: (Math.random()-0.5)*7, r: 6 });
        }
        requestAnimationFrame(updateAvoidFrame);
    }

    function updateAvoidFrame() {
        if (!renderLoopActive) return;
        avoidCtx.clearRect(0, 0, 350, 350);

        // ✅ 플레이어 캔버스 밖 못 나가게 클램핑
        playerPos.x = Math.max(8, Math.min(342, playerPos.x));
        playerPos.y = Math.max(8, Math.min(342, playerPos.y));

        avoidCtx.beginPath(); avoidCtx.arc(playerPos.x, playerPos.y, 8, 0, Math.PI*2); avoidCtx.fillStyle = '#2196f3'; avoidCtx.fill();
        avoidCtx.fillStyle = '#ff5252';

        avoidEnemies.forEach(en => {
            if (avoidGameActive) {
                en.x += en.dx; en.y += en.dy;
                // ✅ 적 공도 반지름 기준 정확히 튕기도록
                if (en.x - en.r < 0)   { en.x = en.r;       en.dx =  Math.abs(en.dx); }
                if (en.x + en.r > 350) { en.x = 350 - en.r; en.dx = -Math.abs(en.dx); }
                if (en.y - en.r < 0)   { en.y = en.r;       en.dy =  Math.abs(en.dy); }
                if (en.y + en.r > 350) { en.y = 350 - en.r; en.dy = -Math.abs(en.dy); }
            }
            avoidCtx.beginPath(); avoidCtx.arc(en.x, en.y, en.r, 0, Math.PI*2); avoidCtx.fill();
            if (avoidGameActive && Math.hypot(playerPos.x - en.x, playerPos.y - en.y) < 14) {
                avoidGameActive = false;
                socket.emit('player_dead');
                const msgTag = document.getElementById('deadMsg');
                msgTag.innerText = deadMessages[Math.floor(Math.random() * deadMessages.length)];
                document.getElementById('deadOverlay').style.display = 'flex';
            }
        });
        requestAnimationFrame(updateAvoidFrame);
    }

    avoidCanvas.addEventListener('mousemove', (e) => {
        const pos = getCanvasPos(e.clientX, e.clientY);
        playerPos.x = Math.max(0, Math.min(350, pos.x));
        playerPos.y = Math.max(0, Math.min(350, pos.y));
    });
    avoidCanvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const pos = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
        playerPos.x = Math.max(0, Math.min(350, pos.x));
        playerPos.y = Math.max(0, Math.min(350, pos.y));
    }, { passive: false });

    // ════════════════════════════════════════════
    //  클릭 게임
    // ════════════════════════════════════════════
    function sendClick() {
        if (!document.getElementById('clickBtn').disabled) socket.emit('click_action');
    }

    // ════════════════════════════════════════════
    //  채팅
    // ════════════════════════════════════════════
    function sendMessage() {
        const input = document.getElementById('chatInput');
        if (input.value.trim()) { socket.emit('send_message', input.value); input.value = ''; }
    }
    socket.on('chat_message', (data) => {
        const p = document.createElement('p'); p.style.margin = '5px 0';
        p.innerHTML = `<b style="color:var(--point-color)">${data.user}:</b> ${data.text}`;
        document.getElementById('chatBox').appendChild(p);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    });

    // ════════════════════════════════════════════
    //  MEMORY GAME 클라이언트 로직
    // ════════════════════════════════════════════
    let memoryDeck = [], memoryFaceUp = {}, memoryMatched = new Set();
    let memoryMyTurn = false;
    let memoryRevealInterval = null;
    let memoryGameTimerInterval = null;
    let memoryTurnTimerInterval = null;

    socket.on('memory_init', ({ deck }) => {
        memoryDeck = deck;
        memoryFaceUp = {};
        memoryMatched = new Set();
        memoryMyTurn = false;
        memoryRenderGrid(true);
        memoryStartRevealCountdown();
    });

    function memoryStartRevealCountdown() {
        const banner   = document.getElementById('memoryTurnBanner');
        const revDiv   = document.getElementById('memoryRevealTimer');
        const revCount = document.getElementById('memoryRevealCount');
        banner.innerText = '👀 카드 위치를 외우세요!';
        revDiv.style.display = 'block';
        let sec = 5;
        revCount.innerText = sec;
        memoryRevealInterval = setInterval(() => {
            sec--;
            revCount.innerText = sec;
            if (sec <= 0) {
                clearInterval(memoryRevealInterval);
                revDiv.style.display = 'none';
                banner.innerText = '카드를 뒤집는 중...';
                memoryRenderGrid(false);
                socket.emit('memory_reveal_done');
            }
        }, 1000);
    }

    // ── 턴 변경 ──
    socket.on('memory_turn_change', ({ currentTurn, currentName, turnTimeLimit }) => {
        memoryMyTurn = (currentTurn === socket.id);
        const banner = document.getElementById('memoryTurnBanner');
        banner.innerText = memoryMyTurn ? '✨ 내 턴! 카드를 선택하세요' : `⏳ ${currentName}의 턴`;
        document.getElementById('memoryGrid').classList.toggle('my-turn', memoryMyTurn);

        // 내 턴 카운트다운
        const turnTimerBox = document.getElementById('memoryTurnTimer');
        const turnTimerVal = document.getElementById('memoryTurnTimerVal');
        clearInterval(memoryTurnTimerInterval);
        memoryTurnTimerInterval = null;
        turnTimerBox.classList.remove('urgent');

        if (memoryMyTurn && turnTimeLimit) {
            let turnLeft = turnTimeLimit;
            turnTimerVal.innerText = turnLeft;
            turnTimerBox.style.display = 'flex';
            memoryTurnTimerInterval = setInterval(() => {
                turnLeft--;
                turnTimerVal.innerText = turnLeft;
                if (turnLeft <= 3) turnTimerBox.classList.add('urgent');
                if (turnLeft <= 0) { clearInterval(memoryTurnTimerInterval); memoryTurnTimerInterval = null; }
            }, 1000);
        } else {
            turnTimerBox.style.display = 'none';
        }
    });

    // ── 턴 시간 초과 ──
    socket.on('memory_turn_timeout', ({ expiredTurn }) => {
        for (const idx in memoryFaceUp) {
            if (memoryFaceUp[idx] && !memoryMatched.has(Number(idx))) {
                memoryFaceUp[idx] = false;
                const el = document.querySelector(`.mg-card[data-idx="${idx}"]`);
                if (el) el.classList.remove('face-up');
            }
        }
        clearInterval(memoryTurnTimerInterval);
        memoryTurnTimerInterval = null;
        document.getElementById('memoryTurnTimer').style.display = 'none';
        if (expiredTurn === socket.id) {
            document.getElementById('memoryTurnBanner').innerText = '⏰ 시간 초과! 턴이 넘어갑니다...';
        }
    });

    // ── 카드 클릭 ──
    function memoryOnCardClick(index) {
        if (!memoryMyTurn) return;
        if (memoryMatched.has(index)) return;
        if (memoryFaceUp[index]) return;
        socket.emit('memory_card_click', index);
    }

    socket.on('memory_card_flipped', ({ index, emoji }) => {
        memoryFaceUp[index] = true;
        memoryDeck[index] = emoji;
        const cardEl = document.querySelector(`.mg-card[data-idx="${index}"]`);
        if (cardEl) {
            cardEl.querySelector('.mg-card__front').innerText = emoji;
            cardEl.classList.add('face-up');
        }
    });

    socket.on('memory_match', ({ indices, playerId, scores }) => {
        indices.forEach(idx => {
            memoryMatched.add(idx);
            const el = document.querySelector(`.mg-card[data-idx="${idx}"]`);
            if (el) { el.classList.add('matched'); el.classList.remove('face-up'); }
        });
        for (const id in scores) {
            const scoreEl = document.getElementById(`mg-score-val-${id}`);
            if (scoreEl) scoreEl.innerText = scores[id];
            const item = document.getElementById(`mg-score-item-${id}`);
            if (item) item.classList.toggle('active-player', playerId === id);
        }
    });

    socket.on('memory_no_match', ({ indices }) => {
        indices.forEach(idx => {
            memoryFaceUp[idx] = false;
            const el = document.querySelector(`.mg-card[data-idx="${idx}"]`);
            if (el) el.classList.remove('face-up');
        });
    });

    function memoryRenderGrid(allFaceUp) {
        const grid = document.getElementById('memoryGrid');
        grid.innerHTML = '';
        memoryDeck.forEach((emoji, i) => {
            const card = document.createElement('div');
            card.className = 'mg-card' + (allFaceUp ? ' face-up' : '');
            card.dataset.idx = i;
            card.innerHTML = `
                <div class="mg-card__inner">
                    <div class="mg-card__back"></div>
                    <div class="mg-card__front">${allFaceUp ? emoji : ''}</div>
                </div>`;
            if (!allFaceUp) card.addEventListener('click', () => memoryOnCardClick(i));
            grid.appendChild(card);
        });
    }

    function memoryUpdateScoreBoard(users) {
        const board = document.getElementById('memoryScoreBoard');
        if (!board || document.getElementById('memoryWrapper').style.display !== 'block') return;
        board.innerHTML = '';
        for (const id in users) {
            const u = users[id];
            const item = document.createElement('div');
            item.className = 'mg-score-item';
            item.id = `mg-score-item-${id}`;
            item.innerHTML = `
                <span class="mg-score-name">${u.userName}</span>
                <span class="mg-score-val" id="mg-score-val-${id}">${u.score || 0}</span>`;
            board.appendChild(item);
        }
    }

    function memoryReset() {
        if (memoryRevealInterval)    { clearInterval(memoryRevealInterval);    memoryRevealInterval = null; }
        if (memoryGameTimerInterval) { clearInterval(memoryGameTimerInterval); memoryGameTimerInterval = null; }
        if (memoryTurnTimerInterval) { clearInterval(memoryTurnTimerInterval); memoryTurnTimerInterval = null; }

        document.getElementById('memoryWrapper').style.display = 'none';
        document.getElementById('memoryGrid').innerHTML = '';
        document.getElementById('memoryScoreBoard').innerHTML = '';
        document.getElementById('memoryRevealTimer').style.display = 'none';
        document.getElementById('memoryTurnTimer').style.display = 'none';
        document.getElementById('memoryTurnTimer').classList.remove('urgent');
        document.getElementById('memoryGameTimer').classList.remove('urgent');
        document.getElementById('memoryGameTimerVal').innerText = '--';
        document.getElementById('memoryTurnBanner').innerText = '잠시 후 게임이 시작됩니다...';

        memoryDeck = []; memoryFaceUp = {}; memoryMatched = new Set();
        memoryMyTurn = false;
    }

</script>
</body>
</html>
