<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>쫄? - 랜덤 게임 대결</title>
    <style>
        :root {
            --point-color: #ffeb3b; 
            --text-color: #ffffff;
            --btn-green: #4caf50;
            --btn-orange: #ff9800;
        }

        body {
            font-family: 'Do Hyeon', sans-serif;
            background: radial-gradient(circle at center, #a70b13 0%, #3a0002 100%);
            color: var(--text-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100dvh; overflow-y: auto; padding: 20px 0;
        }

        .container { text-align: center; width: 90%; max-width: 400px; }
        .app-logo { font-size: 160px; margin: 0 0 40px 0; color: #ffdd33; display: inline-block; transform: rotate(10deg); text-shadow: -3px -3px 0 #fffbe6, 3px -3px 0 #fffbe6, -3px 3px 0 #e69500, 3px 3px 0 #e69500, 0px 6px 0 #cc7a00, 0px 12px 0 #b35f00, 0px 18px 0 #994700, 0px 24px 20px rgba(0,0,0,0.8); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: rotate(10deg) translateY(0px); } 50% { transform: rotate(10deg) translateY(-15px); } }

        input[type="text"] { width: 100%; padding: 15px; font-size: 18px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; margin-bottom: 15px; text-align: center; font-family: inherit; }
        button { width: 100%; padding: 15px; font-size: 24px; border: none; border-radius: 50px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; box-shadow: 0 6px 0px rgba(0,0,0,0.3); font-family: inherit; }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0px rgba(0,0,0,0.3); }

        .btn-main { background-color: var(--point-color); color: #3a0002; }
        .btn-sub { background-color: transparent; color: white; border: 2px solid rgba(255,255,255,0.5); }
        .btn-back { margin-top: 15px; border-color: rgba(255, 255, 255, 0.3); color: #ccc; font-size: 20px; }
        
        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #gameNameDisplay { font-size: 32px; color: var(--point-color); margin-bottom: 10px; display: none; }
        #timer { font-size: 80px; color: var(--point-color); display: none; margin: 10px 0; text-shadow: 0 0 20px rgba(255, 235, 59, 0.6); }
        
        #gameZone { display: none; margin-bottom: 20px; }
        #clickBtn { font-size: 50px; padding: 40px; background: radial-gradient(circle, #ff5e5e 0%, #c62828 100%); border-radius: 30px; color: white; border: none; box-shadow: 0 10px 0px #8e0000; width: 100%; }
        #clickBtn:disabled { background: #555; box-shadow: 0 10px 0px #333; color: #aaa; }

        #reactionPanel { width: 100%; height: 200px; border-radius: 30px; display: none; justify-content: center; align-items: center; font-size: 30px; cursor: pointer; user-select: none; }
        .reaction-wait { background-color: #d32f2f; }
        .reaction-go { background-color: #388e3c; }

        #usersList { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; text-align: left; margin-bottom: 20px; backdrop-filter: blur(5px);}
        #userUl { list-style: none; padding: 0; margin: 0; }
        #userUl li { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 20px; }

        .chat-box { height: 100px; background: rgba(0,0,0,0.4); border-radius: 15px; overflow-y: auto; padding: 10px; margin-top: 15px; text-align: left; font-size: 16px; }
        
        #resultPopup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; flex-direction: column; justify-content: center; align-items: center; }
        .popup-title { font-size: 60px; margin-bottom: 20px; text-align: center; }
        .win-text { color: #ffeb3b; } .lose-text { color: #e57373; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <h1 class="app-logo">쫄?</h1>

    <div id="screen-landing" class="screen active">
        <input type="text" id="userName" placeholder="닉네임을 입력하세요" maxlength="8" autocomplete="off"/>
        <button class="btn-main" onclick="goToMenu()">시작하기</button>
    </div>

    <div id="screen-role" class="screen">
        <p id="welcome-msg" style="font-size: 28px; color: var(--point-color);"></p>
        <button class="btn-main" onclick="createRoom()">방 만들기</button>
        <button class="btn-sub" onclick="showJoinInput()">입장하기</button>
        <div id="join-input-area" style="display:none; margin-top:15px;">
            <input type="text" id="roomNameInput" placeholder="방 코드" style="text-transform:uppercase"/>
            <button class="btn-main" onclick="joinRoom()">입장 완료</button>
        </div>
        <button class="btn-sub btn-back" onclick="goBackToLanding()">← 뒤로가기</button>
    </div>

    <div id="screen-game" class="screen">
        <h2 id="roomTitle" style="color: rgba(255,255,255,0.7);"></h2>
        <div id="usersList"><ul id="userUl"></ul></div>
        <button id="readyBtn" onclick="toggleReady()">준비하기 (Ready)</button>

        <h2 id="gameNameDisplay">대결 준비!</h2>
        <div id="gameZone">
            <div id="timer"><span id="timeDisplay">3</span></div>
            <button id="clickBtn" onclick="onGameClick()">클릭</button>
            <div id="reactionPanel" onclick="onReactionClick()">화면을 보세요!</div>
        </div>

        <div class="chat-box" id="chatBox"></div>
        <button id="leaveBtn" class="btn-sub btn-back" onclick="leaveRoom()">← 방 나가기</button>
    </div>
</div>

<div id="resultPopup">
    <h1 id="popupTitle" class="popup-title"></h1>
    <p id="popupDesc" style="font-size: 24px; color: white; margin-bottom: 40px;"></p>
    <button class="btn-main" style="width: 200px;" onclick="closePopup()">확인</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myName = "", isMyReady = false, currentGameType = "", reactionStartTime = 0, reactionTimer = null;

    function changeScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function goToMenu() { myName = document.getElementById('userName').value.trim(); if(!myName) return alert("닉네임!"); document.getElementById('welcome-msg').innerText = `${myName}님 반갑습니다!`; changeScreen('screen-role'); }
    function goBackToLanding() { changeScreen('screen-landing'); }
    function createRoom() { performJoin(Math.random().toString(36).substring(2, 6).toUpperCase()); }
    function showJoinInput() { document.getElementById('join-input-area').style.display = 'block'; }
    function joinRoom() { const code = document.getElementById('roomNameInput').value.toUpperCase(); socket.emit('check_room', code, (ex) => ex ? performJoin(code) : alert("방 없음")); }
    function performJoin(code) { socket.emit('join_room', { roomName: code, userName: myName }); document.getElementById('roomTitle').innerText = `ROOM : ${code}`; changeScreen('screen-game'); }
    function leaveRoom() { socket.emit('leave_room'); location.reload(); }
    function toggleReady() { isMyReady = !isMyReady; socket.emit('toggle_ready'); document.getElementById('readyBtn').innerText = isMyReady ? "준비 취소" : "준비하기 (Ready)"; }

    function onGameClick() { if(currentGameType === 'click' && !document.getElementById('clickBtn').disabled) socket.emit('game_action'); }
    
    function onReactionClick() {
        if(currentGameType === 'reaction') {
            const panel = document.getElementById('reactionPanel');
            if(panel.classList.contains('reaction-go')) {
                const diff = Date.now() - reactionStartTime;
                socket.emit('game_action', diff);
                panel.innerText = "기록 전송됨!";
                panel.classList.remove('reaction-go');
                panel.classList.add('reaction-wait');
            } else if(panel.style.display === 'flex' && panel.classList.contains('reaction-wait')) {
                socket.emit('game_foul');
            }
        }
    }

    socket.on('update_users', (users) => {
        const ul = document.getElementById('userUl'); ul.innerHTML = '';
        for(const id in users) {
            const u = users[id];
            const scoreVal = (u.score === 99999) ? '실격' : (u.score === 9999 ? '대기' : u.score);
            const status = u.ready ? '<span style="color:#81c784">[준비]</span>' : '<span style="color:#e57373">[대기]</span>';
            ul.innerHTML += `<li>${status} ${u.userName} <span style="float:right;"><b>${scoreVal}</b></span></li>`;
        }
    });

    socket.on('game_selected', (type) => {
        currentGameType = type;
        document.getElementById('gameNameDisplay').innerText = (type === 'click' ? "광클 대결!" : "반응속도 테스트!");
        document.getElementById('gameNameDisplay').style.display = 'block';
        document.getElementById('readyBtn').style.display = 'none';
        document.getElementById('leaveBtn').style.display = 'none';
        document.getElementById('gameZone').style.display = 'block';
        document.getElementById('timer').style.display = 'block';
        
        if(type === 'reaction') {
            const panel = document.getElementById('reactionPanel');
            panel.style.display = 'flex'; panel.classList.add('reaction-wait'); panel.innerText = "대기...";
            document.getElementById('clickBtn').style.display = 'none';
        } else {
            document.getElementById('clickBtn').style.display = 'block';
            document.getElementById('clickBtn').disabled = true;
            document.getElementById('clickBtn').innerText = "대기...";
            document.getElementById('reactionPanel').style.display = 'none';
        }
    });

    socket.on('game_countdown', (count) => {
        let c = count; document.getElementById('timeDisplay').innerText = c;
        const iv = setInterval(() => { if(--c > 0) document.getElementById('timeDisplay').innerText = c; else { document.getElementById('timeDisplay').innerText = "GO!"; clearInterval(iv); } }, 1000);
    });

    socket.on('game_start', ({ type, duration }) => {
        if(type === 'click') {
            const btn = document.getElementById('clickBtn'); btn.disabled = false; btn.innerText = "클릭!";
            let t = duration; document.getElementById('timeDisplay').innerText = t;
            const iv = setInterval(() => { if(--t >= 0) document.getElementById('timeDisplay').innerText = t; else clearInterval(iv); }, 1000);
        } else {
            const panel = document.getElementById('reactionPanel');
            panel.innerText = "초록색이 되면 탭!";
            document.getElementById('timer').style.display = 'none';
            reactionTimer = setTimeout(() => {
                if(currentGameType === 'reaction') {
                    panel.classList.remove('reaction-wait'); panel.classList.add('reaction-go');
                    panel.innerText = "지금 탭!!!"; reactionStartTime = Date.now();
                }
            }, 2000 + Math.random() * 3000);
        }
    });

    socket.on('game_over', ({ winners, maxScore, type, foulerId }) => {
        const isWinner = winners.some(w => w.trim() === myName.trim());
        const title = document.getElementById('popupTitle');
        
        clearTimeout(reactionTimer);

        // 1. 반응속도 테스트에서 부정출발이 발생한 경우
        if (type === 'reaction' && foulerId) {
            if (socket.id === foulerId) {
                // 내가 실격자인 경우
                title.innerText = "빨리 탭하기 긁?";
                title.className = "popup-title lose-text";
            } else {
                // 내가 실격자가 아닌 경우 (승리)
                title.innerText = "승리!";
                title.className = "popup-title win-text";
            }
        } 
        // 2. 정상적으로 종료된 경우 (광클 또는 반응속도 정상 클릭)
        else {
            if (isWinner) {
                title.innerText = "승리!";
                title.className = "popup-title win-text";
            } else {
                title.innerText = "긁?";
                title.className = "popup-title lose-text";
            }
        }
        
        let displayScore = (maxScore === 9999 || maxScore === 99999) ? '실패' : maxScore;
        document.getElementById('popupDesc').innerText = `${type === 'click' ? '기록' : '반응속도'}: ${displayScore}${type === 'click' ? '회' : 'ms'}`;
        document.getElementById('resultPopup').style.display = 'flex';
        
        document.getElementById('gameZone').style.display = 'none';
        document.getElementById('gameNameDisplay').style.display = 'none';
        document.getElementById('readyBtn').style.display = 'inline-block';
        document.getElementById('leaveBtn').style.display = 'inline-block';
        document.getElementById('clickBtn').style.display = 'none';
        document.getElementById('reactionPanel').style.display = 'none';
        isMyReady = false;
        document.getElementById('readyBtn').innerText = "준비하기 (Ready)";
    });

    function closePopup() { document.getElementById('resultPopup').style.display = 'none'; }
    socket.on('chat_message', (d) => { const p = document.createElement('p'); p.innerHTML = `<b>${d.user}:</b> ${d.text}`; const b = document.getElementById('chatBox'); b.appendChild(p); b.scrollTop = b.scrollHeight; });
</script>
</body>
</html>
